<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
window.addEventListener("message", function(event) {
  var data = event.data;
  if (!data || data.type !== "parseImage") return;

  google.script.run
    .withSuccessHandler(function(result) {
      window.parent.postMessage({ type: "parseImageResult", result: result }, "*");
    })
    .withFailureHandler(function(err) {
      window.parent.postMessage({ type: "parseImageResult", result: { success: false, error: err.message || "서버 오류" } }, "*");
    })
    .apiParseImage({ image: data.image });
});

// 로드 완료 알림
window.parent.postMessage({ type: "bridgeReady" }, "*");
</script>
</body>
</html>
